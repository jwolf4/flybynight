<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fly By Night — Goodnight</title>
  <link rel="stylesheet" href="splash.css" />

  <!-- Optional: load a proper cursive font (much better than system fallback) -->
  <link href="https://fonts.googleapis.com/css2?family=Mr+Dafoe&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>

  <div class="wrap">
    <div class="pc-stage">
      <div class="pc-title">
        <h1 class="flicker">Fly By Night</h1>
        <div class="subtle flicker">CLOSING<span class="cursor"></span></div>
      </div>

      <div class="center">

        <!-- Your uploaded sprite -->
        <img 
          src="retro_pc.png" 
          alt="Vintage Computer" 
          class="retro-sprite pixelated"
        />

        <!-- Proper cursive farewell -->
        <div class="goodnight flicker">
          See you console cowboy...
        </div>

      </div>
    </div>
  </div>

  <script src="splash.js"></script>
</body>
</html>
