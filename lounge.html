<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fly By Night - Lounge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <header class="header header-sticky" id="header">
    <div class="brand">
      <h1 class="flicker">Fly By Night</h1>
      <p class="tagline flicker">Live in your world, <em>Fly in ours.</em></p>
    </div>
    <nav class="main-nav" aria-label="Primary">
      <a class="nav-link" href="index.html">House Floor</a>
      <a class="nav-link active" href="lounge.html" aria-current="page">Lounge</a>
    </nav>
  </header>

  <main class="lounge-shell">
    <section class="lounge-box" aria-label="Lounge area">
      <div class="desktop-icons" aria-label="Desktop shortcuts">
        <figure class="desktop-icon">
          <img src="icons/bust_1.png" alt="Desktop icon 1" />
          <figcaption>Shortcut 01</figcaption>
        </figure>
        <figure class="desktop-icon">
          <img src="icons/bust_2.png" alt="Desktop icon 2" />
          <figcaption>Shortcut 02</figcaption>
        </figure>
        <figure class="desktop-icon">
          <img src="icons/bust_3.png" alt="Desktop icon 3" />
          <figcaption>Shortcut 03</figcaption>
        </figure>
        <figure class="desktop-icon">
          <img src="icons/lamp.gif" alt="Desktop icon 4" />
          <figcaption>Shortcut 04</figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
