# /var/www/flybynight/conf/rtmp2rtc.conf
# SRS v5 — RTC (WHIP) + HLS (single stream: live/live)

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

# HTTP server: serves HLS files + SRS demo pages
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# (Optional) HTTP API (nice for debugging). Not required for WHIP/HLS.
http_api {
    enabled         on;
    listen          1985;
}

# WebRTC server: media over UDP 8000.
rtc_server {
    enabled         on;
    listen          8000;
    # Uses env var CANDIDATE from docker: -e CANDIDATE=flybynight.channel
    candidate       $CANDIDATE;
}

vhost __defaultVhost__ {

    # HLS output. This is what creates /live/live.m3u8
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    6;
        hls_window      30;

        # Usually fine to leave defaults, but keep playlist fresh for polling
        hls_cleanup     on;
    }

    # Enable RTC for this vhost (required for WHIP/WebRTC publish/play)
    rtc {
        enabled     on;

        # If you later need TURN, add it here.
        # For now: UDP 8000 + candidate + port-forward is the main requirement.
    }

    # (Optional) RTMP-to-RTC “bridge” features, kept on in most rtmp2rtc examples.
    # Doesn’t hurt even if you mostly WHIP.
    #
    # Some sample configs include this block; safe to omit if you prefer minimal.
    #
    # publish {
    #     mr           off;
    # }

    # (Optional) HTTP-FLV mount (not needed for HLS, but harmless)
    # If you want to keep your earlier mount line, you can.
    http_static {
        enabled     on;
        mount       [vhost]/;
        dir         ./objs/nginx/html;
    }
}