# /var/www/flybynight/conf/rtmp2rtc.conf
# SRS v5 — RTC publish -> RTMP -> HLS

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       $CANDIDATE;
}

# Keep default (handy fallback)
vhost __defaultVhost__ {
    rtc {
        enabled     on;
        rtc_to_rtmp on;
    }
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    6;
        hls_window      30;
        hls_cleanup     on;
    }
    http_static {
        enabled on;
        mount   [vhost]/;
        dir     ./objs/nginx/html;
    }
}

# IMPORTANT: your actual domain vhost
vhost flybynight.channel {
    rtc {
        enabled     on;
        rtc_to_rtmp on;
        # (optional) pli_for_rtmp 0.5;
    }

    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    6;
        hls_window      30;
        hls_cleanup     on;
    }

    http_static {
        enabled on;
        mount   [vhost]/;
        dir     ./objs/nginx/html;
    }
}