server {
    server_name flybynight.channel www.flybynight.channel;

    root /var/www/flybynight;
    index index.html;
# SRS demo/SDK pages
location ^~ /players/ {
    proxy_pass http://127.0.0.1:8088/players/;
    proxy_set_header Host $host;
}

location /media/ {
    alias /srv/flybynight/media/;
    autoindex off;
    add_header Cache-Control "no-store";
}
# Optional (handy)
location ^~ /demos/ {
    proxy_pass http://127.0.0.1:8088/demos/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
location ^~ /console/ {
    proxy_pass http://127.0.0.1:8088/console/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
    location / {
        try_files $uri $uri/ =404;
    }
    location /goodnight {
        try_files $uri $uri/ =404;
    }
    location /closed {
        try_files $uri $uri/ =404;
    }
# HLS output
location ^~ /live/ {
    proxy_pass http://127.0.0.1:8088/live/;
    proxy_set_header Host $host;

    # HLS friendliness
    proxy_buffering off;
    add_header Cache-Control no-cache always;
    add_header Access-Control-Allow-Origin "*" always;
}

location ~* \.m3u8$ {
  add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  add_header Pragma "no-cache" always;
  add_header Expires "0" always;
}

location ~* \.ts$ {
  add_header Cache-Control "no-cache, max-age=0" always;
  add_header Pragma "no-cache" always;
  add_header Expires "0" always;
}

# WHIP/WHEP endpoints on SRS (publisher + player control plane)
    location /rtc/ {
        proxy_pass http://127.0.0.1:1985/rtc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

# Local control service status (single-stream lock)
    location = /control/status {
        proxy_pass http://127.0.0.1:8090/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control no-cache;
    }

    location = /control/stop {
        proxy_pass http://127.0.0.1:8090/stop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control no-cache;
    }

    location ^~ /api/ {
    proxy_pass http://127.0.0.1:8090/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Cache-Control no-cache;
}

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/flybynight.channel/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/flybynight.channel/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.flybynight.channel) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = flybynight.channel) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name flybynight.channel www.flybynight.channel;
    return 404; # managed by Certbot




}
