<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fly By Night</title>
  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: monospace;
      text-align: center;
      padding-top: 20vh;
    }

    h1.flicker {
      font-size: 3em;
      color: #00ff00;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      5% { opacity: 0.5; }
      10% { opacity: 0.3; }
      15% { opacity: 1; }
      20% { opacity: 0.6; }
      25% { opacity: 0.2; }
      30% { opacity: 1; }
      100% { opacity: 1; }
    }

    button {
      background-color: transparent;
      border: 2px solid #00ff00;
      color: #00ff00;
      font-size: 1.5em;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #00ff00;
      color: black;
    }
  </style>
</head>
<body>
  <h1 class="flicker">Fly By Night</h1>
  <p>Live in your world, fly in ours</p>
  <button id="enterBtn">Enter</button>

  <script>
    document.getElementById("enterBtn").onclick = () => {
      window.location.href = "/main.html";
    };
  </script>
</body>
</html>
