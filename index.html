<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fly By Night — Catalog Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <main class="shell">
    <header class="header">
      <div class="brand">
        <h1 class="flicker">Fly By Night</h1>
        <p class="tagline flicker">Live in your world, <em>Fly in ours.</em></p>
        <p class="tagline flicker subtle">CATALOG // 5 thread-spots // memory only</p>
      </div>

      <div class="status">
        <div class="status-row">
          <span class="label">SPOTS:</span>
          <span id="spotsStatus" class="value">0/5 active</span>
        </div>
        <div class="status-row">
          <span class="label">REFRESH:</span>
          <span id="refreshStatus" class="value">every 10s</span>
        </div>
        <div class="status-row">
          <span class="label">LOCAL:</span>
          <span class="value">volatile</span>
        </div>
      </div>
    </header>

    <section class="catalog">
      <div id="spotsGrid" class="spots-grid"></div>
    </section>

    <footer class="footer">
      <div class="flicker subtle">
        <span id="clock"></span>
        <span class="cursor"></span>
      </div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
