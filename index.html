<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fly By Night — Catalog Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <header class="header header-sticky" id="header">
    <div class="brand">
      <h1 class="flicker">Fly By Night</h1>
      <p class="tagline flicker">Live in your world, <em>Fly in ours.</em></p>
      <p class="tagline flicker subtle">CATALOG // 5 thread-spots // memory only</p>
    </div>

    <div class="status">
      <div class="status-row">
        <span class="label">SPOTS:</span>
        <span id="spotsStatus" class="value">0/5 active</span>
      </div>
      <div class="status-row">
        <span class="label">REFRESH:</span>
        <span id="refreshStatus" class="value">every 10s</span>
      </div>
      <div class="status-row">
        <span class="label">LOCAL:</span>
        <span class="value">volatile</span>
      </div>
    </div>
  </header>

  <!-- STAGE (fixed under header) -->
  <section class="stage-wrap stage-sticky" id="stageWrap">
    <div class="stage">
      <img class="stage-sprite" src="stage.png" alt="Stage" />
      <div class="stage-video" aria-label="Video placeholder">
        <div class="stage-video-inner flicker subtle">
          <section id="live" class="panel">
  <div class="live-wrap">
    <div class="live-header">
      <div class="live-title">LIVE</div>
      <div id="live-status" class="live-status">checking…</div>
    </div>

    <div class="live-video">
      <video
        id="live-video"
        playsinline
        muted
        autoplay
        controls
        preload="none"
      ></video>

      <div id="live-overlay" class="live-overlay">
        <div class="live-overlay-inner">
          <button id="btnToggleStream" class="btn">Start Streaming</button>
<div id="pubStatus" class="hint"></div>
        </div>
      </div>
    </div>
  </div>
</section>
        </div>
      </div>
<button id="backToTablesTop" class="stage-back hidden" type="button">
  ← Back to tables
</button>
    </div>
  </section>

  <!-- TABLES / THREADS -->
  <main class="shell">
    <section class="catalog">
      <div id="tablesStage" class="tables-stage">
        <div id="spotsGrid"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="flicker subtle">
        <span id="clock"></span>
        <span class="cursor"></span>
      </div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script src="/players/js/srs.sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
