<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fly By Night — Catalog Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <header class="header header-sticky" id="header">
    <div class="brand">
      <h1 class="flicker">Fly By Night</h1>
      <p class="tagline flicker">Live in your world, <em>Fly in ours.</em></p>
    </div>

  </header>

  <!-- STAGE (fixed under header) -->
  <section class="stage-wrap stage-sticky" id="stageWrap">
    <div class="stage">
      <img class="stage-sprite" src="stage.png" alt="Stage" />
      <div class="stage-video" aria-label="Video placeholder">
        <div class="stage-video-inner">
          <section id="live" class="panel">
  <div class="live-wrap">
    <div class="live-header">
      <div class="live-title">LIVE</div>
      <div id="live-status" class="live-status">offline</div>
    </div>

    <div class="live-video">
      <video
        id="live-video"
        playsinline
        muted
        autoplay
        controls
        preload="none"
      ></video>

      <div id="live-overlay" class="live-overlay">
        <div class="live-overlay-inner">
          <div class="live-controls">
            <button id="btnStartStream" class="btn" type="button">Start Streaming</button>
            <button id="btnStopStream" class="btn btn-danger hidden" type="button">Stop Stream</button>
          </div>
          <video id="local-preview" class="hidden" autoplay playsinline muted></video>
          <div id="pubStatus" class="hint"></div>
        </div>
      </div>
    </div>
  </div>
</section>
        </div>
      </div>
<button id="backToTablesTop" class="stage-back hidden" type="button">
  ← Back to tables
</button>
    </div>
  </section>

  <!-- TABLES / THREADS -->
  <main class="shell">
    <section class="catalog">
      <div id="tablesStage" class="tables-stage">
        <div id="spotsGrid"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="flicker subtle">
        <span id="clock"></span>
        <span class="cursor"></span>
      </div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18"></script>
  <script>
  function attachHls(video, src) {
    // Cache-bust the playlist URL to defeat any intermediate caching.
    const url = src + (src.includes('?') ? '&' : '?') + 't=' + Date.now();

    const hls = new Hls({
      // Make it stop retrying forever (defaults are very patient).
      manifestLoadingMaxRetry: 2,
      levelLoadingMaxRetry: 2,
      fragLoadingMaxRetry: 2,

      manifestLoadingRetryDelay: 500,
      levelLoadingRetryDelay: 500,
      fragLoadingRetryDelay: 500,

      // Keep live latency/buffer small so "stale replay" is minimal.
      liveSyncDuration: 3,          // seconds behind live edge
      liveMaxLatencyDuration: 6,    // if it drifts, catch up
      maxBufferLength: 6,           // cap buffer (seconds)
      backBufferLength: 0
    });

    let stallTimer = null;
    let lastTime = 0;
    let lastProgressAt = Date.now();

    function hardStop(reason) {
      console.log('[HLS] offline:', reason);

      // Stop network + detach
      try { hls.stopLoad(); } catch {}
      try { hls.detachMedia(); } catch {}
      try { hls.destroy(); } catch {}

      // Clear the element buffer so it can't "replay the last bit"
      try {
        video.pause();
        video.removeAttribute('src');
        video.load();
      } catch {}

      // Your UI hook: show "offline / start stream" state here
      // setOfflineUI(true);
    }

    // If playback time isn't advancing for ~4s while we think we're playing, declare offline.
    function startStallWatch() {
      clearInterval(stallTimer);
      lastTime = video.currentTime || 0;
      lastProgressAt = Date.now();

      stallTimer = setInterval(() => {
        const t = video.currentTime || 0;
        const advancing = t > lastTime + 0.05;
        if (advancing) {
          lastTime = t;
          lastProgressAt = Date.now();
          return;
        }
        const stuckMs = Date.now() - lastProgressAt;
        if (!video.paused && stuckMs > 4000) hardStop('stalled >4s');
      }, 500);
    }

    hls.on(Hls.Events.ERROR, (event, data) => {
      // Treat these as terminal for your "single stream" experience.
      const fatal =
        data.fatal ||
        data.details === Hls.ErrorDetails.MANIFEST_LOAD_ERROR ||
        data.details === Hls.ErrorDetails.LEVEL_LOAD_ERROR ||
        data.details === Hls.ErrorDetails.FRAG_LOAD_ERROR;

      if (fatal) hardStop(data.details || 'fatal error');
    });

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      startStallWatch();
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    // Also restart stall watch whenever playback resumes
    video.addEventListener('playing', startStallWatch);
    video.addEventListener('pause', () => clearInterval(stallTimer));

    return hls;
  }
</script>
  <script src="/players/js/srs.sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
