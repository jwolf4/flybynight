<html lang="en">
        <head>
                  <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                      <title>Fly By Night</title>
                        <style>
    body {
                  background-color: #000;
                                color: #00ff00;
                                              font-family: monospace;
                                                            display: flex;
                                                                          flex-direction: column;
                                                                                        justify-content: center;
                                                                                                      align-items: center;
                                                                                                                    height: 100vh;
                                                                                                                                  margin: 0;
                                                                                                                                                position: relative;
                                                                                                                                                            }
        h1 {
                      font-size: 2.5rem;
                                    margin-bottom: 0.5rem;
                                                  text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
                                                              }
            p {
                          font-size: 1.1rem;
                                        margin: 0.3rem 0;
                                                      text-shadow: 0 0 3px #00ff00;
                                                                  }
                .cursor {
                              display: inline-block;
                                            width: 10px;
                                                          height: 1em;
                                                                        background-color: #00ff00;
                                                                                      animation: blink 1s step-end infinite;
                                                                                                  }
                    @keyframes blink {
                                  from, to { background-color: transparent; }
                                        50% { background-color: #00ff00; }
                                            }
                        .scanlines {
                                      position: absolute;
                                                    top: 0;
                                                                  left: 0;
                                                                                width: 100%;
                                                                                              height: 100%;
                                                                                                            background: repeating-linear-gradient(
                                                                                                                            to bottom,
                                                                                                                                    rgba(0, 255, 0, 0.05) 0px,
                                                                                                                                            rgba(0, 255, 0, 0.05) 2px,
                                                                                                                                                    transparent 2px,
                                                                                                                                                            transparent 4px
                                                                                                                                                                  );
                                                                                                                                                                pointer-events: none;
                                                                                                                                                                              z-index: 1;
                                                                                                                                                                                          }
                            .content {
                                          position: relative;
                                                        z-index: 2;
                                                                      text-align: center;
                                                                                  }
                                .flicker {
                                              animation: flicker 3s infinite;
                                                          }
                                    @keyframes flicker {
                                                  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                                                                  opacity: 1;
                                                                                }
                                                        20%, 22%, 24%, 55% {
                                                                        opacity: 0.5;
                                                                                      }
                                                            }
                                      </style>
        </head>
        <body>
                  <div class="scanlines"></div>
                    <div class="content">
                                <h1 class="flicker">Fly By Night</h1>
                                    <p class="flicker">Live in your world, <em>Fly in ours.</em></p>
                                        <p class="flicker"><strong>Coming Soon</strong> <span class="cursor"></span></p>
                                          </div>
        </body>
</html>
